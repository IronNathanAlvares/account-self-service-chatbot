<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 720" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .step { fill:#ffffff; stroke:#3b82f6; stroke-width:1.6; rx:10; }
      .dec  { fill:#eef2ff; stroke:#6366f1; stroke-width:1.6; }
      .term { fill:#0f172a; rx:20; }
      .good { fill:#ecfdf5; stroke:#10b981; stroke-width:1.6; rx:10; }
      .warn { fill:#fff7ed; stroke:#f59e0b; stroke-width:1.6; rx:10; }
      .t    { fill:#0f172a; font-size:13px; font-weight:600; }
      .tw   { fill:#ffffff; font-size:13px; font-weight:600; }
      .s    { fill:#64748b; font-size:11px; }
      .e    { stroke:#475569; stroke-width:1.6; fill:none; marker-end:url(#a); }
      .lbl  { fill:#475569; font-size:11px; font-weight:600; }
    </style>
  </defs>

  <text x="28" y="34" font-size="19" font-weight="700" fill="#0f172a">LLD - Request pipeline &amp; action state machine</text>
  <text x="28" y="54" class="s">Every customer message flows top-to-bottom. Reads exit early; writes must validate, (confirm), persist, then notify.</text>

  <rect class="term" x="360" y="76" width="200" height="40"/>
  <text class="tw" x="405" y="101">Customer message</text>

  <rect class="step" x="360" y="140" width="200" height="52"/>
  <text class="t" x="376" y="163">1 · Parse intent</text>
  <text class="s" x="376" y="181">rules → LLM (structured)</text>

  <rect class="dec" x="352" y="216" width="216" height="64" transform="skewX(-0)"/>
  <text class="t" x="404" y="244">confidence high?</text>
  <text class="s" x="372" y="264">low → ask a clarifying question</text>

  <rect class="warn" x="640" y="220" width="220" height="56"/>
  <text class="t" x="656" y="243">clarify / unsupported</text>
  <text class="s" x="656" y="262">reply, keep pending state</text>

  <rect class="step" x="360" y="308" width="200" height="52"/>
  <text class="t" x="376" y="331">2 · Route to handler</text>
  <text class="s" x="376" y="349">one of 16 ChatActions</text>

  <rect class="dec" x="352" y="384" width="216" height="60"/>
  <text class="t" x="430" y="410" text-anchor="middle">read or write?</text>
  <text class="s" x="430" y="429" text-anchor="middle">read → fetch &amp; reply (no email)</text>

  <rect class="good" x="640" y="388" width="220" height="52"/>
  <text class="t" x="656" y="411">Read handler</text>
  <text class="s" x="656" y="429">return data, no notification</text>

  <rect class="step" x="360" y="472" width="200" height="52"/>
  <text class="t" x="376" y="495">3 · Validate fields (zod)</text>
  <text class="s" x="376" y="513">email · phone · amount · date</text>

  <rect class="dec" x="352" y="548" width="216" height="60"/>
  <text class="t" x="430" y="574" text-anchor="middle">valid &amp; complete?</text>
  <text class="s" x="430" y="593" text-anchor="middle">missing → ask · invalid → explain</text>

  <rect class="warn" x="640" y="552" width="220" height="52"/>
  <text class="t" x="656" y="575">Ask for missing detail</text>
  <text class="s" x="656" y="593">returns missingFields[]</text>

  <rect class="step" x="360" y="636" width="200" height="52"/>
  <text class="t" x="376" y="659">4 · Execute + persist</text>
  <text class="s" x="376" y="677">repo write + audit event</text>

  <rect class="good" x="60" y="636" width="250" height="52"/>
  <text class="t" x="76" y="659">5 · Notify (on data change)</text>
  <text class="s" x="76" y="677">generic email + encrypted PDF</text>

  <rect class="term" x="60" y="548" width="250" height="44"/>
  <text class="tw" x="76" y="575">6 · Structured reply → UI cards</text>

  <!-- money/destructive confirm callout -->
  <rect x="60" y="440" width="250" height="72" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5" rx="10"/>
  <text class="t" x="76" y="463">Two-phase confirm</text>
  <text class="s" x="76" y="482">payments &amp; deletes propose first,</text>
  <text class="s" x="76" y="499">execute only after an explicit "yes"</text>

  <!-- edges -->
  <path class="e" d="M460 116 V140"/>
  <path class="e" d="M460 192 V216"/>
  <path class="e" d="M568 248 H640"/>
  <text class="lbl" x="583" y="240">no</text>
  <path class="e" d="M460 280 V308"/>
  <text class="lbl" x="468" y="298">yes</text>
  <path class="e" d="M460 360 V384"/>
  <path class="e" d="M568 414 H640"/>
  <text class="lbl" x="583" y="406">read</text>
  <path class="e" d="M460 444 V472"/>
  <text class="lbl" x="468" y="464">write</text>
  <path class="e" d="M460 524 V548"/>
  <path class="e" d="M568 578 H640"/>
  <text class="lbl" x="583" y="570">no</text>
  <path class="e" d="M460 608 V636"/>
  <text class="lbl" x="468" y="628">yes</text>
  <path class="e" d="M360 662 H310"/>
  <path class="e" d="M185 636 V592"/>
</svg>
