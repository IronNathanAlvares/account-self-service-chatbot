<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 700" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="one" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L2,10" stroke="#475569" stroke-width="1.6"/>
    </marker>
    <marker id="many" markerWidth="14" markerHeight="14" refX="1" refY="6" orient="auto">
      <path d="M12,2 L2,6 L12,10 M2,6 H12" stroke="#475569" stroke-width="1.4" fill="none"/>
    </marker>
    <style>
      .tbl  { fill:#ffffff; stroke:#94a3b8; stroke-width:1.5; rx:8; }
      .hdr  { fill:#0f172a; }
      .new  { fill:#4338ca; }
      .hdrt { fill:#ffffff; font-size:13px; font-weight:700; }
      .col  { fill:#334155; font-size:11px; }
      .pk   { fill:#334155; font-size:11px; font-weight:700; }
      .rel  { stroke:#475569; stroke-width:1.5; fill:none; marker-start:url(#one); marker-end:url(#many); }
      .badge{ fill:#eef2ff; stroke:#6366f1; stroke-width:1; rx:9; }
    </style>
  </defs>

  <text x="24" y="30" font-size="18" font-weight="700" fill="#0f172a">LLD — Data model (starter tables + 3 additions)</text>
  <text x="24" y="50" font-size="12" fill="#64748b">Indigo headers = tables to add. All child tables FK to account_holders (on delete cascade).</text>

  <!-- account_holders (center-left) -->
  <g>
    <rect class="tbl" x="60" y="250" width="220" height="150"/>
    <rect class="hdr" x="60" y="250" width="220" height="26" rx="8"/>
    <text class="hdrt" x="72" y="268">account_holders</text>
    <text class="pk"  x="72" y="292">id (PK, uuid)</text>
    <text class="col" x="72" y="310">account_id (unique)</text>
    <text class="col" x="72" y="328">email · phone · address</text>
    <text class="col" x="72" y="346">preferred_contact_method</text>
    <text class="col" x="72" y="364">balance_cents  (>= 0 check)</text>
    <text class="col" x="72" y="382">status · days_past_due</text>
  </g>

  <!-- related_people -->
  <g>
    <rect class="tbl" x="360" y="60" width="200" height="92"/>
    <rect class="hdr" x="360" y="60" width="200" height="26" rx="8"/>
    <text class="hdrt" x="372" y="78">related_people</text>
    <text class="pk"  x="372" y="102">id (PK)</text>
    <text class="col" x="372" y="120">name · email · phone</text>
    <text class="col" x="372" y="138">authorized_to_act (bool)</text>
  </g>

  <!-- promises_to_pay -->
  <g>
    <rect class="tbl" x="360" y="168" width="200" height="86"/>
    <rect class="hdr" x="360" y="168" width="200" height="26" rx="8"/>
    <text class="hdrt" x="372" y="186">promises_to_pay</text>
    <text class="pk"  x="372" y="210">id (PK)</text>
    <text class="col" x="372" y="228">amount_cents · due_date</text>
    <text class="col" x="372" y="246">status</text>
  </g>

  <!-- transactions -->
  <g>
    <rect class="tbl" x="360" y="270" width="200" height="104"/>
    <rect class="hdr" x="360" y="270" width="200" height="26" rx="8"/>
    <text class="hdrt" x="372" y="288">transactions</text>
    <text class="pk"  x="372" y="312">id (PK)</text>
    <text class="col" x="372" y="330">type · status · amount_cents</text>
    <text class="col" x="372" y="348">description · transaction_date</text>
    <text class="col" x="372" y="366" fill="#4338ca">+ idempotency_key (unique)</text>
  </g>

  <!-- call_appointments -->
  <g>
    <rect class="tbl" x="360" y="392" width="200" height="86"/>
    <rect class="hdr" x="360" y="392" width="200" height="26" rx="8"/>
    <text class="hdrt" x="372" y="410">call_appointments</text>
    <text class="pk"  x="372" y="434">id (PK)</text>
    <text class="col" x="372" y="452">scheduled_at · phone</text>
    <text class="col" x="372" y="470">reason · status</text>
  </g>

  <!-- notification_attempts -->
  <g>
    <rect class="tbl" x="360" y="494" width="200" height="86"/>
    <rect class="hdr" x="360" y="494" width="200" height="26" rx="8"/>
    <text class="hdrt" x="372" y="512">notification_attempts</text>
    <text class="pk"  x="372" y="536">id (PK)</text>
    <text class="col" x="372" y="554">trigger_action · status</text>
    <text class="col" x="372" y="572">sensitive_detail_in_pdf</text>
  </g>

  <!-- NEW: account_change_events -->
  <g>
    <rect class="tbl" x="700" y="150" width="230" height="118"/>
    <rect class="new" x="700" y="150" width="230" height="26" rx="8"/>
    <text class="hdrt" x="712" y="168">account_change_events  ★</text>
    <text class="pk"  x="712" y="192">id (PK)</text>
    <text class="col" x="712" y="210">action · changed_by</text>
    <text class="col" x="712" y="228">before (jsonb) · after (jsonb)</text>
    <text class="col" x="712" y="246">created_at  — powers audit + undo</text>
  </g>

  <!-- NEW: conversations -->
  <g>
    <rect class="tbl" x="700" y="300" width="230" height="96"/>
    <rect class="new" x="700" y="300" width="230" height="26" rx="8"/>
    <text class="hdrt" x="712" y="318">conversations  ★</text>
    <text class="pk"  x="712" y="342">id (PK)</text>
    <text class="col" x="712" y="360">pending_action (jsonb)</text>
    <text class="col" x="712" y="378">— slot-filling state across turns</text>
  </g>

  <!-- NEW: chat_messages -->
  <g>
    <rect class="tbl" x="700" y="430" width="230" height="110"/>
    <rect class="new" x="700" y="430" width="230" height="26" rx="8"/>
    <text class="hdrt" x="712" y="448">chat_messages  ★</text>
    <text class="pk"  x="712" y="472">id (PK)</text>
    <text class="col" x="712" y="490">conversation_id (FK)</text>
    <text class="col" x="712" y="508">role · content</text>
    <text class="col" x="712" y="526">parsed_intent (jsonb)</text>
  </g>

  <!-- relationships from account_holders -->
  <path class="rel" d="M280 300 C320 200 330 120 360 106"/>
  <path class="rel" d="M280 305 C320 240 330 215 360 210"/>
  <path class="rel" d="M280 320 H360"/>
  <path class="rel" d="M280 345 C320 420 330 430 360 434"/>
  <path class="rel" d="M280 360 C320 520 330 535 360 536"/>
  <path class="rel" d="M280 300 C480 210 560 210 700 209"/>
  <path class="rel" d="M280 330 C500 340 560 348 700 348"/>
  <!-- conversations -> chat_messages -->
  <path class="rel" d="M815 396 V430"/>
</svg>
